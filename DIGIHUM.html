<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Magnet Poetry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --text: #2c2c2c;
  --text-muted: #7a8a9a;
  --text-light: #a0b0c0;
  --border: #d0dce8;
  --accent: #3d5a80;
  --surface: rgba(255,255,255,0.92);
  --hover: rgba(255,255,255,0.6);
  --success: #4a8a5a;
  --error: #b05050;
  --cloud-white: rgba(255,255,255,0.95);
  --cloud-shadow: rgba(100,130,170,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Nunito',sans-serif;
  color:var(--text);
  -webkit-user-select:none; user-select:none;
  min-height:100vh;
  overflow:hidden;
  background:#87CEEB;
}

/* ═══ ANIMATED SKY — canvas-rendered ═══════════════════ */
#skyCanvas {
  position:fixed; inset:0; z-index:0;
  width:100%; height:100%;
}

/* ═══ NAV ═══════════════════════════════════════════════ */
nav {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; height:50px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,215,230,0.5);
}
.nav-logo { font-size:1rem; font-weight:700; color:var(--accent); }
.nav-tabs { display:flex; gap:4px; }
.nav-tab {
  font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
  color:var(--text-muted); background:none; border:none;
  padding:6px 16px; border-radius:20px; cursor:pointer; transition:all 0.2s;
}
.nav-tab:hover { color:var(--text); background:rgba(255,255,255,0.7); }
.nav-tab.active { color:#fff; background:var(--accent); }
.sound-btn {
  width:30px; height:30px; border-radius:50%; border:none;
  background:rgba(255,255,255,0.6); cursor:pointer; font-size:0.8rem;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-muted); transition:all 0.2s;
}
.sound-btn:hover { background:rgba(255,255,255,0.9); }
.sound-btn.muted { opacity:0.4; }

/* ═══ PANELS ════════════════════════════════════════════ */
.panel { display:none; height:calc(100vh - 50px); position:relative; z-index:5; }
.panel.active { display:flex; }

/* ═══ CLOUD MAGNET ══════════════════════════════════════ */
.magnet {
  font-family:'Nunito',sans-serif; font-size:0.88rem; font-weight:700;
  color:var(--accent); background:var(--cloud-white);
  padding:6px 16px; border-radius:20px; border:none;
  cursor:grab; white-space:nowrap;
  box-shadow: 0 2px 8px var(--cloud-shadow), 0 0 0 1px rgba(200,220,240,0.3);
  transition: box-shadow 0.15s, transform 0.1s;
  touch-action:none; position:absolute;
}
.magnet::before {
  content:''; position:absolute;
  width:14px; height:12px; background:var(--cloud-white);
  border-radius:50%; top:-5px; left:18%;
  box-shadow: 10px -2px 0 2px var(--cloud-white), 22px 0 0 0 var(--cloud-white);
}
.magnet:hover { box-shadow: 0 4px 14px rgba(100,140,180,0.2); transform:translateY(-1px); }
.magnet.dragging {
  cursor:grabbing; box-shadow: 0 8px 24px rgba(100,140,180,0.25);
  transform:rotate(-1.5deg) scale(1.04); z-index:999 !important;
}
.tray-col .magnet, .word-pool .magnet, .drop-zone .magnet, .glue-panel .magnet {
  position:relative; display:inline-block;
}

.magnet.magnet-glue {
  background:rgba(230,240,250,0.9); color:var(--text-muted);
  font-weight:600; font-size:0.78rem; padding:4px 12px; border-radius:16px;
}
.magnet.magnet-glue::before { display:none; }

/* ═══ FRIDGE ════════════════════════════════════════════ */
#panel-fridge { flex-direction:column; }

.fridge-bar {
  display:flex; align-items:center; gap:6px; padding:8px 20px;
  background:rgba(255,255,255,0.8); backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(200,215,230,0.4); flex-wrap:wrap;
}
.bar-label {
  font-size:0.65rem; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; color:var(--text-light); margin-right:4px;
}
.cat-btn {
  font-family:'Nunito',sans-serif; font-size:0.75rem; font-weight:600;
  color:var(--text-muted); background:none; border:1px solid transparent;
  padding:3px 11px; border-radius:16px; cursor:pointer; transition:all 0.2s;
}
.cat-btn:hover { color:var(--text); background:rgba(255,255,255,0.6); }
.cat-btn.active { color:#fff; background:var(--accent); border-color:var(--accent); }
.fridge-clear {
  margin-left:auto; font-family:'Nunito',sans-serif;
  font-size:0.7rem; font-weight:600; color:var(--text-muted);
  background:rgba(255,255,255,0.5); border:1px solid var(--border);
  padding:4px 12px; border-radius:16px; cursor:pointer; transition:all 0.2s;
}
.fridge-clear:hover { color:var(--error); border-color:var(--error); }

.fridge-body { flex:1; display:flex; overflow:hidden; }

.tray-col {
  width:160px; display:flex; flex-direction:column;
  background:rgba(255,255,255,0.8); backdrop-filter:blur(8px);
  border-right:1px solid rgba(200,215,230,0.4);
}
.tray {
  flex:1; padding:10px 8px; overflow-y:auto;
  display:flex; flex-wrap:wrap; align-content:flex-start; gap:6px;
}
.sky-board {
  flex:1; position:relative; overflow:hidden;
}

/* ── right-side fixed panel (suffixes + connectors) ──── */
.right-col {
  width:140px; display:flex; flex-direction:column;
  background:rgba(255,255,255,0.8); backdrop-filter:blur(8px);
  border-left:1px solid rgba(200,215,230,0.4);
}
.right-section {
  flex:1; display:flex; flex-direction:column;
  min-height:0; overflow:hidden;
}
.right-section + .right-section {
  border-top:1px solid rgba(200,215,230,0.4);
}
.right-label {
  padding:6px 8px 3px; font-size:0.55rem; font-weight:700;
  text-transform:uppercase; letter-spacing:0.8px;
  color:var(--text-light); flex-shrink:0;
}
.right-guide {
  padding:0 8px 6px;
  font-size:0.68rem;
  font-weight:600;
  color:var(--text-muted);
  line-height:1.25;
}
.right-body {
  flex:1; padding:4px 6px; overflow-y:auto;
  display:flex; flex-wrap:wrap; align-content:flex-start; gap:4px;
}
.right-col .magnet { position:relative; display:inline-block; }

/* ═══ LETTERS ══════════════════════════════════════════ */
#panel-letters { flex-direction:column; }
.letters-bar {
  display:flex; align-items:center; gap:6px; padding:8px 20px;
  background:rgba(255,255,255,0.8); backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(200,215,230,0.4);
}
.letter-tile {
  width:38px; height:34px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700;
  color:var(--accent); background:var(--cloud-white);
  border:none; border-radius:18px; cursor:grab;
  box-shadow:0 2px 8px var(--cloud-shadow), 0 0 0 1px rgba(200,220,240,0.3);
  touch-action:none; transition:box-shadow 0.15s, transform 0.1s;
  position:relative;
}
.letter-tile::before {
  content:''; position:absolute;
  width:12px; height:10px; background:var(--cloud-white);
  border-radius:50%; top:-4px; left:22%;
  box-shadow: 8px -1px 0 1px var(--cloud-white), 17px 0 0 0 var(--cloud-white);
}
.letter-tile:hover { box-shadow:0 4px 12px rgba(100,140,180,0.18); transform:translateY(-1px); }
.letter-tile.dragging { cursor:grabbing; box-shadow:0 8px 20px rgba(100,140,180,0.22); z-index:999 !important; }
.letter-tray .letter-tile { position:relative; }
.letters-board .letter-tile { position:absolute; }
.letters-body { flex:1; display:flex; overflow:hidden; }
.letter-tray {
  width:160px; padding:10px 8px; overflow-y:auto;
  display:flex; flex-wrap:wrap; align-content:flex-start;
  gap:4px; justify-content:center;
  background:rgba(255,255,255,0.8); backdrop-filter:blur(8px);
  border-right:1px solid rgba(200,215,230,0.4);
}
.letters-board { flex:1; position:relative; overflow:hidden; }

/* ═══ SCRAMBLE ══════════════════════════════════════════ */
#panel-scramble {
  flex-direction:column; align-items:center; justify-content:center;
  padding:36px 24px;
}
.scramble-wrap {
  max-width:540px; width:100%;
  background:rgba(255,255,255,0.85); backdrop-filter:blur(12px);
  border-radius:24px; padding:32px 28px;
  box-shadow: 0 8px 30px rgba(100,140,180,0.12);
}
.scr-header { text-align:center; margin-bottom:28px; }
.scr-label {
  font-size:0.65rem; font-weight:700; text-transform:uppercase;
  letter-spacing:1.2px; color:var(--text-light); margin-bottom:4px;
}
.scr-title { font-size:1.4rem; font-weight:700; color:var(--accent); }
.scr-hint { font-size:0.8rem; color:var(--text-muted); margin-top:4px; font-style:italic; }

.drop-zone {
  min-height:52px; border:1.5px dashed var(--border); border-radius:16px;
  padding:12px; margin-bottom:20px;
  display:flex; flex-wrap:wrap; gap:8px;
  justify-content:center; align-items:center;
  transition:all 0.2s; background:rgba(255,255,255,0.5);
}
.drop-zone-ph { font-size:0.78rem; color:var(--text-light); }
.word-pool {
  display:flex; flex-wrap:wrap; gap:8px;
  justify-content:center; min-height:44px; margin-bottom:24px;
}
.scr-fb { text-align:center; font-size:0.88rem; font-weight:600; min-height:22px; margin-bottom:16px; }
.fb-ok { color:var(--success); }
.fb-no { color:var(--error); }
.fb-win { color:var(--success); font-size:0.95rem; }

.scr-answer {
  text-align:center; font-size:0.9rem; font-weight:600; color:var(--text-muted);
  background:rgba(230,240,250,0.6); border-radius:10px;
  padding:0; max-height:0; overflow:hidden; margin-bottom:0; transition:all 0.35s ease;
}
.scr-answer.visible { padding:12px 18px; max-height:50px; margin-bottom:14px; }
.ans-label { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-light); margin-right:6px; }

.scr-actions { display:flex; justify-content:center; gap:8px; }
.btn {
  font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
  padding:7px 20px; border-radius:20px; border:1px solid var(--border);
  background:rgba(255,255,255,0.8); color:var(--text); cursor:pointer; transition:all 0.2s;
}
.btn:hover { background:#fff; }
.btn-dark { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-dark:hover { background:#2c4a6a; }

.score-pill {
  font-size:0.72rem; font-weight:600; color:var(--text-muted);
  text-align:center; margin-bottom:24px;
}

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
@keyframes mergePop {
  0%   { transform:scale(1); opacity:1; }
  40%  { transform:scale(1.25); }
  100% { transform:scale(1); }
}
.magnet.merging { animation:mergePop 0.35s ease; }

/* ═══ CONFETTI ══════════════════════════════════════════ */
.confetti { position:fixed; width:6px; height:6px; border-radius:1px; z-index:9999; pointer-events:none; opacity:0; animation:cFall 1.2s ease-out forwards; }
@keyframes cFall { 0%{opacity:1;transform:translateY(0) rotate(0)} 100%{opacity:0;transform:translateY(60vh) rotate(600deg)} }

/* ═══ RESPONSIVE ════════════════════════════════════════ */
@media(max-width:640px){
  nav{padding:0 14px;}
  .nav-tab{padding:5px 10px;font-size:0.72rem;}
  .tray-col,.letter-tray{width:110px;}
  .right-col{width:100px;}
  .scramble-wrap{padding:20px 16px;}
}
</style>
</head>
<body>

<!-- ═══ SKY CANVAS ═════════════════════════════════════ -->
<canvas id="skyCanvas"></canvas>

<nav>
  <div class="nav-logo">Magnet Poetry</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-p="fridge">Fridge</button>
    <button class="nav-tab" data-p="scramble">Scramble</button>
    <button class="nav-tab" data-p="letters">Letters</button>
  </div>
  <div class="nav-right">
    <button class="sound-btn" id="sndBtn" title="Sound">♪</button>
  </div>
</nav>

<!-- ═══ FRIDGE ═══════════════════════════════════════════ -->
<section id="panel-fridge" class="panel active">
  <div class="fridge-bar">
    <span class="bar-label">Words</span>
    <button class="cat-btn active" data-cat="nature">Nature</button>
    <button class="cat-btn" data-cat="feelings">Feelings</button>
    <button class="cat-btn" data-cat="action">Action</button>
    <button class="cat-btn" data-cat="wonder">Wonder</button>
    <button class="fridge-clear" id="clearBoard">Clear</button>
  </div>
  <div class="fridge-body">
    <div class="tray-col">
      <div class="tray" id="wordTray"></div>
    </div>
    <div class="sky-board" id="fridgeBoard"></div>
    <div class="right-col">
      <div class="right-section">
        <div class="right-label">Suffixes</div>
        <div class="right-guide">Touch & drag a suffix onto a word. See the magic!</div>
        <div class="right-body" id="suffixBody"></div>
      </div>
      <div class="right-section">
        <div class="right-label">Connectors</div>
        <div class="right-body" id="connectorBody"></div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ SCRAMBLE ═════════════════════════════════════════ -->
<section id="panel-scramble" class="panel">
  <div class="scramble-wrap">
    <div class="score-pill" id="scrScore">0 points</div>
    <div class="scr-header">
      <div class="scr-label">Unscramble the verse</div>
      <div class="scr-title" id="scrTitle"></div>
      <div class="scr-hint" id="scrHint"></div>
    </div>
    <div class="drop-zone" id="scrZone"><span class="drop-zone-ph">tap words to place them here</span></div>
    <div class="word-pool" id="scrPool"></div>
    <div class="scr-fb" id="scrFb"></div>
    <div class="scr-answer" id="scrAns"></div>
    <div class="scr-actions">
      <button class="btn" id="scrReset">Reset</button>
      <button class="btn btn-dark" id="scrCheck">Check</button>
      <button class="btn" id="scrShow" style="display:none">Show Answer</button>
      <button class="btn" id="scrNext">Next →</button>
    </div>
  </div>
</section>

<!-- ═══ LETTERS ═════════════════════════════════════════ -->
<section id="panel-letters" class="panel">
  <div class="letters-bar">
    <span class="bar-label">Set</span>
    <button class="cat-btn active" data-set="upper">A B C</button>
    <button class="cat-btn" data-set="lower">a b c</button>
    <button class="cat-btn" data-set="num">1 2 3</button>
    <button class="fridge-clear" id="clearLetters">Clear</button>
  </div>
  <div class="letters-body">
    <div class="letter-tray" id="letterTray"></div>
    <div class="letters-board" id="lettersBoard"></div>
  </div>
</section>

<script>
/* ═══════════════════════════════════════════════════════
   REALISTIC SKY RENDERER (canvas)
   ═══════════════════════════════════════════════════════ */
(function(){
const cv = document.getElementById('skyCanvas');
const cx = cv.getContext('2d');
let W, H;

function resize(){
  W = cv.width  = window.innerWidth;
  H = cv.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* ── sky gradient ─────────────────────────────────────── */
function drawSky(){
  const g = cx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    '#1a3a5c');
  g.addColorStop(0.08, '#234b73');
  g.addColorStop(0.2,  '#3a6d99');
  g.addColorStop(0.35, '#5a96c0');
  g.addColorStop(0.5,  '#7db8d9');
  g.addColorStop(0.62, '#a3d1e8');
  g.addColorStop(0.72, '#c8dfd0');
  g.addColorStop(0.78, '#e2d8b8');
  g.addColorStop(0.83, '#d4c498');
  g.addColorStop(0.87, '#8aaa60');
  g.addColorStop(0.89, '#5c8a38');
  g.addColorStop(0.92, '#4a7a2c');
  g.addColorStop(0.96, '#3a6a20');
  g.addColorStop(1,    '#2a5518');
  cx.fillStyle = g;
  cx.fillRect(0, 0, W, H);
}

/* ── rolling hills (layered for depth) ────────────────── */
function drawHills(){
  const layers = [
    { y: 0.84, color:'#6a9a48', amp:18, freq:0.003, offset:0 },
    { y: 0.87, color:'#558a35', amp:14, freq:0.004, offset:50 },
    { y: 0.90, color:'#468028', amp:10, freq:0.005, offset:120 },
    { y: 0.93, color:'#3a7020', amp:6,  freq:0.007, offset:200 },
  ];
  layers.forEach(l => {
    cx.beginPath();
    cx.moveTo(0, H);
    for(let x = 0; x <= W; x += 2){
      const y = H * l.y
        + Math.sin((x + l.offset) * l.freq) * l.amp
        + Math.sin((x + l.offset * 1.7) * l.freq * 2.3) * l.amp * 0.4;
      cx.lineTo(x, y);
    }
    cx.lineTo(W, H);
    cx.closePath();
    cx.fillStyle = l.color;
    cx.fill();
  });
}

/* ── sun with corona & god-rays ───────────────────────── */
function drawSun(t){
  const sx = W * 0.80, sy = H * 0.13 + Math.sin(t * 0.00005) * 5;
  cx.save();
  for(let i = 0; i < 12; i++){
    const a = (i / 12) * Math.PI * 2 + t * 0.00003;
    const len = 90 + Math.sin(t * 0.0002 + i) * 25;
    const g = cx.createLinearGradient(sx, sy,
      sx + Math.cos(a) * len, sy + Math.sin(a) * len);
    g.addColorStop(0, 'rgba(255,245,200,0.18)');
    g.addColorStop(1, 'rgba(255,220,120,0)');
    cx.beginPath();
    cx.moveTo(sx + Math.cos(a - 0.08) * 30, sy + Math.sin(a - 0.08) * 30);
    cx.lineTo(sx + Math.cos(a) * len, sy + Math.sin(a) * len);
    cx.lineTo(sx + Math.cos(a + 0.08) * 30, sy + Math.sin(a + 0.08) * 30);
    cx.fillStyle = g;
    cx.fill();
  }
  const glow = cx.createRadialGradient(sx, sy, 0, sx, sy, 110);
  glow.addColorStop(0,  'rgba(255,250,220,0.45)');
  glow.addColorStop(0.25,'rgba(255,235,170,0.18)');
  glow.addColorStop(0.6, 'rgba(255,210,130,0.06)');
  glow.addColorStop(1,   'rgba(255,200,100,0)');
  cx.fillStyle = glow;
  cx.fillRect(sx - 110, sy - 110, 220, 220);
  const sg = cx.createRadialGradient(sx - 4, sy - 4, 0, sx, sy, 26);
  sg.addColorStop(0,  '#fffef0');
  sg.addColorStop(0.3,'#fff8c4');
  sg.addColorStop(0.7,'#ffe070');
  sg.addColorStop(1,  '#ffc830');
  cx.beginPath(); cx.arc(sx, sy, 26, 0, Math.PI * 2);
  cx.fillStyle = sg; cx.fill();
  cx.restore();
}

/* ── crescent moon ────────────────────────────────────── */
function drawMoon(){
  const mx = W * 0.12, my = H * 0.11;
  cx.save(); cx.globalAlpha = 0.30;
  const mg = cx.createRadialGradient(mx - 4, my - 4, 0, mx, my, 22);
  mg.addColorStop(0, '#f5f5e8'); mg.addColorStop(1, '#d5d5c0');
  cx.beginPath(); cx.arc(mx, my, 20, 0, Math.PI * 2);
  cx.fillStyle = mg; cx.fill();
  cx.globalCompositeOperation = 'destination-out';
  cx.beginPath(); cx.arc(mx + 8, my - 5, 17, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(0,0,0,1)'; cx.fill();
  cx.globalCompositeOperation = 'source-over';
  cx.globalAlpha = 0.08;
  [[mx-5, my-3, 2.5],[mx+2, my+5, 2],[mx-3, my+7, 1.5]].forEach(c => {
    cx.beginPath(); cx.arc(c[0], c[1], c[2], 0, Math.PI*2);
    cx.fillStyle = '#b0b090'; cx.fill();
  });
  cx.restore();
}

/* ── volumetric clouds ────────────────────────────────── */
const clouds = [
  { x: -200, y: 0.10, scale: 1.3, speed: 18, bubbles: [{x:0,y:0,r:28},{x:22,y:-10,r:34},{x:50,y:-14,r:26},{x:72,y:-6,r:20},{x:35,y:10,r:22},{x:12,y:8,r:18},{x:58,y:8,r:16},{x:-10,y:6,r:15}] },
  { x: -400, y: 0.22, scale: 1.0, speed: 14, bubbles: [{x:0,y:0,r:22},{x:18,y:-8,r:26},{x:40,y:-10,r:20},{x:56,y:-4,r:16},{x:25,y:8,r:18},{x:8,y:6,r:14}] },
  { x: -100, y: 0.06, scale: 1.5, speed: 10, bubbles: [{x:0,y:0,r:30},{x:28,y:-12,r:36},{x:60,y:-16,r:28},{x:88,y:-8,r:22},{x:42,y:12,r:24},{x:15,y:10,r:20},{x:70,y:10,r:18},{x:105,y:-2,r:16},{x:-14,y:5,r:16}] },

  { x: -350, y: 0.16, scale: 0.9, speed: 12, bubbles: [{x:0,y:0,r:24},{x:20,y:-9,r:28},{x:46,y:-12,r:22},{x:66,y:-5,r:18},{x:30,y:9,r:20},{x:10,y:7,r:16}] },

function drawCloud(c, t){
  const xPos = ((c.x + t * c.speed * 0.003) % (W + 400)) - 200;
  const yPos = H * c.y + Math.sin(t * 0.00008 + c.x) * 4;
  cx.save();
  cx.translate(xPos, yPos);
  cx.scale(c.scale, c.scale);
  cx.globalAlpha = 0.12;
  c.bubbles.forEach(b => {
    cx.beginPath(); cx.arc(b.x, b.y + 10, b.r * 0.9, 0, Math.PI * 2);
    cx.fillStyle = '#8090a0'; cx.fill();
  });
  cx.globalAlpha = 0.85;
  c.bubbles.forEach(b => {
    const g = cx.createRadialGradient(b.x - b.r*0.15, b.y - b.r*0.25, b.r*0.1, b.x, b.y, b.r);
    g.addColorStop(0,  'rgba(255,255,255,0.98)');
    g.addColorStop(0.5,'rgba(248,250,252,0.85)');
    g.addColorStop(0.8,'rgba(235,240,248,0.55)');
    g.addColorStop(1,  'rgba(220,230,242,0.15)');
    cx.beginPath(); cx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    cx.fillStyle = g; cx.fill();
  });
  cx.globalAlpha = 0.35;
  c.bubbles.forEach(b => {
    const hl = cx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.4, 0, b.x, b.y, b.r*0.6);
    hl.addColorStop(0, 'rgba(255,255,255,0.8)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    cx.beginPath(); cx.arc(b.x - b.r*0.15, b.y - b.r*0.2, b.r*0.55, 0, Math.PI*2);
    cx.fillStyle = hl; cx.fill();
  });
  cx.restore();
}

/* ── birds with realistic wing flap ───────────────────── */
const birds = [
  { x:-30, y:0.14, speed:38, size:1.0, flapSpeed:4.5, phase:0 },
  { x:-80, y:0.18, speed:32, size:0.8, flapSpeed:5.2, phase:1.2 },
  { x:-150,y:0.11, speed:42, size:0.7, flapSpeed:5.8, phase:2.5 },
  { x:-200,y:0.20, speed:28, size:0.9, flapSpeed:4.0, phase:3.8 },
  { x:-50, y:0.08, speed:35, size:0.6, flapSpeed:6.0, phase:5.0 },
  { x:-120,y:0.16, speed:30, size:0.75,flapSpeed:5.5, phase:0.8 },
  { x:-250,y:0.22, speed:26, size:0.65,flapSpeed:5.0, phase:4.2 },
];

function drawBird(b, t){
  const bx = ((b.x + t * b.speed * 0.003) % (W + 100)) - 50;
  const by = H * b.y + Math.sin(t * 0.0003 + b.phase) * 8;
  const flap = Math.sin(t * 0.002 * b.flapSpeed + b.phase);
  cx.save();
  cx.translate(bx, by);
  cx.scale(b.size, b.size);
  cx.strokeStyle = 'rgba(30,35,40,0.7)';
  cx.lineWidth = 1.8;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(-16, 2 + flap * 2);
  cx.quadraticCurveTo(-10, -6 - flap * 8, -1, -1 - flap * 3);
  cx.stroke();
  cx.beginPath();
  cx.moveTo(1, -1 - flap * 3);
  cx.quadraticCurveTo(10, -6 - flap * 8, 16, 2 + flap * 2);
  cx.stroke();
  cx.beginPath();
  cx.moveTo(-1, -1 - flap * 3);
  cx.lineTo(1, -1 - flap * 3);
  cx.lineWidth = 2.5;
  cx.stroke();
  cx.restore();
}


/* ── atmospheric haze ─────────────────────────────────── */
function drawAtmosphere(){
  const haze = cx.createLinearGradient(0, H * 0.7, 0, H * 0.88);
  haze.addColorStop(0, 'rgba(200,215,230,0)');
  haze.addColorStop(0.5,'rgba(200,215,230,0.08)');
  haze.addColorStop(1, 'rgba(200,215,230,0)');
  cx.fillStyle = haze;
  cx.fillRect(0, H * 0.7, W, H * 0.18);
}

/* ── grass texture on foreground hill ─────────────────── */
function drawGrassDetail(){
  cx.save();
  cx.strokeStyle = 'rgba(80,140,40,0.25)';
  cx.lineWidth = 1;
  cx.lineCap = 'round';
  for(let i = 0; i < 200; i++){
    const gx = Math.random() * W;
    const baseY = H * 0.93 + Math.sin((gx + 200) * 0.007) * 6;
    const gh = 4 + Math.random() * 6;
    const lean = (Math.random() - 0.5) * 4;
    cx.beginPath();
    cx.moveTo(gx, baseY);
    cx.quadraticCurveTo(gx + lean * 0.5, baseY - gh * 0.6, gx + lean, baseY - gh);
    cx.stroke();
  }
  cx.restore();
}

/* ── wildflowers ──────────────────────────────────────── */
const flowers = [];
for(let i = 0; i < 30; i++){
  flowers.push({
    x: Math.random() * 1.1 - 0.05,
    color: ['#e06060','#e0c040','#d080d0','#6080e0','#e08040'][0|Math.random()*5],
    size: 1.5 + Math.random() * 2,
  });
}
function drawFlowers(){
  flowers.forEach(f => {
    const fx = W * f.x;
    const fy = H * 0.93 + Math.sin((fx + 200) * 0.007) * 6 - 2;
    cx.beginPath(); cx.arc(fx, fy, f.size, 0, Math.PI * 2);
    cx.fillStyle = f.color; cx.fill();
  });
}

/* ── render loop ──────────────────────────────────────── */
let grassDrawn = false, grassImg = null;

function frame(t){
  cx.clearRect(0, 0, W, H);
  drawSky();
  drawSun(t);
  drawMoon();
  drawAtmosphere();
  clouds.forEach(c => drawCloud(c, t));
  birds.forEach(b => drawBird(b, t));
  drawHills();
  if(!grassDrawn){
    drawGrassDetail();
    drawFlowers();
    grassDrawn = true;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.addEventListener('resize', () => { grassDrawn = false; });
})();

/* ═══ Sound ══════════════════════════════════════════════ */
const Snd=(()=>{let ctx,on=true;const ac=()=>ctx||(ctx=new(AudioContext||webkitAudioContext)());const p=(t,f,d,v=.15)=>{if(!on)return;try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d);}catch{}};return{toggle(){on=!on;return on},pick(){p('sine',700,.06,.1)},drop(){p('triangle',200,.1,.18)},snap(){p('sine',500,.05,.08)},ok(){p('sine',523,.12,.15);setTimeout(()=>p('sine',659,.12,.15),100);setTimeout(()=>p('sine',784,.2,.18),200)},no(){p('sawtooth',180,.2,.08)},win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>p('sine',f,.15,.14),i*90))},pop(){p('sine',600,.05,.12)},woosh(){if(!on)return;try{const c=ac(),o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=0.5;o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);o.frequency.exponentialRampToValueAtTime(900,c.currentTime+0.15);o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.3);g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);o.connect(f).connect(g).connect(c.destination);o.start();o.stop(c.currentTime+0.35);}catch{}}};})();

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function confetti(x,y,n=20){const cols=['#4a90c4','#ffd54f','#6d9a4a','#87CEEB','#fff'];for(let i=0;i<n;i++){const d=document.createElement('div');d.className='confetti';const a=Math.random()*Math.PI*2,s=50+Math.random()*80;d.style.left=(x+Math.cos(a)*s*.4)+'px';d.style.top=y+'px';d.style.background=cols[0|Math.random()*cols.length];d.style.animationDuration=(1+Math.random()*.6)+'s';document.body.appendChild(d);setTimeout(()=>d.remove(),1800);}}

const WORDS={
  nature:['sun','moon','star','sky','cloud','rain','wind','tree','leaf','flower','river','ocean','mountain','bird','butterfly','snow','grass','forest','stone','earth','dawn','dusk','petal','seed','root','breeze','storm','wave','garden','meadow','frost','dew','bloom','nest','feather','shell','vine','moss'],
  feelings:['love','hope','joy','dream','peace','wonder','happy','brave','kind','gentle','warm','calm','bright','free','wild','soft','sweet','true','bold','dear','wish','grace','glow','tender','proud','merry','cozy'],
  action:['sing','dance','fly','run','jump','swim','grow','shine','play','write','draw','paint','build','climb','explore','whisper','giggle','twirl','skip','soar','bloom','sparkle','imagine','create','wander','gather','share','laugh'],

const CONNECTORS=['the','a','an','is','are','was','were','been','in','on','at','to','of','and','but','or','with','for','from','by','my','your','our','this','that','it','I','we','they','he','she','so','if','as','not','no','yes','can','will','would','could','shall','may','do','does','did','has','have','had','than','then','when','where','how','what','who','why','all','each','every','some','any','many','much','more','most','very','too','also','just','only','still','now','here','there','up','down','out','off','away','back','over','under','into','upon','like','about'];

const board=document.getElementById('fridgeBoard');

function mkMag(w,isGlue){
  const m=document.createElement('div');
  m.className='magnet'+(isGlue?' magnet-glue':'');
  m.textContent=w;
  m.addEventListener('mousedown',e=>clone(e,m));
  m.addEventListener('touchstart',e=>clone(e,m),{passive:false});
  return m;
}
function loadTray(cat){tray.innerHTML='';WORDS[cat].forEach(w=>tray.appendChild(mkMag(w,false)));}
function loadRightPanel(){
  const sb=document.getElementById('suffixBody');
  SUFFIX_WORDS.forEach(w=>sb.appendChild(mkMag(w,true)));
  const cb=document.getElementById('connectorBody');
  CONNECTORS.forEach(w=>cb.appendChild(mkMag(w,true)));
}

function clone(e,src){
  e.preventDefault();const pt=e.touches?e.touches[0]:e;
  const m=document.createElement('div');m.className=src.className;m.textContent=src.textContent;
  board.appendChild(m);const br=board.getBoundingClientRect();
  m.style.left=(pt.clientX-br.left-24)+'px';m.style.top=(pt.clientY-br.top-10)+'px';
  dragStart(m,e);bindMag(m);
}
const SUFFIXES=['-s','-es','-ed','-ing','-ly','-er','-est','-ful','-ness','-less','-y','-ish','-ous','-ment','-tion','-able','-en','-al','-ic','-ive'];
function isSuffix(txt){ return SUFFIXES.includes(txt); }

function tryMerge(dropped){
  const txt = dropped.textContent;
  if(!isSuffix(txt)) return false;
  const suffix = txt.slice(1);
  const dr = dropped.getBoundingClientRect();
  const cx = dr.left + dr.width/2, cy = dr.top + dr.height/2;
  let best = null, bestDist = 60;
  board.querySelectorAll('.magnet').forEach(m => {
    if(m === dropped) return;
    if(isSuffix(m.textContent)) return;
    const mr = m.getBoundingClientRect();
    const mx = mr.left + mr.width/2, my = mr.top + mr.height/2;
    const dist = Math.sqrt((cx-mx)**2 + (cy-my)**2);
    if(dist < bestDist){ bestDist = dist; best = m; }
  });
  if(!best) return false;
  const combined = best.textContent + suffix;
  best.textContent = combined;
  best.classList.remove('magnet-glue');
  best.classList.add('merging');
  setTimeout(()=> best.classList.remove('merging'), 400);
  dropped.remove();
  Snd.woosh();
  const br = best.getBoundingClientRect();
  confetti(br.left + br.width/2, br.top, 10);
  return true;
}

function dragStart(el,ev){
  const br=board.getBoundingClientRect();
  let oL=parseFloat(el.style.left),oT=parseFloat(el.style.top);
  const p0=ev.touches?ev.touches[0]:ev;let sx=p0.clientX,sy=p0.clientY;
  el.classList.add('dragging');Snd.pick();
  const mv=e=>{e.preventDefault();const p=e.touches?e.touches[0]:e;el.style.left=(oL+p.clientX-sx)+'px';el.style.top=(oT+p.clientY-sy)+'px';};
  const up=()=>{
    el.classList.remove('dragging');
    document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);
    const r=el.getBoundingClientRect();
    if(r.right<br.left||r.left>br.right||r.bottom<br.top||r.top>br.bottom){ el.remove(); Snd.drop(); return; }
    if(!tryMerge(el)) Snd.drop();
  };
  document.addEventListener('mousemove',mv,{passive:false});document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);
}
function bindMag(el){const d=e=>{e.preventDefault();e.stopPropagation();dragStart(el,e);};el.addEventListener('mousedown',d);el.addEventListener('touchstart',d,{passive:false});}

document.querySelectorAll('.cat-btn[data-cat]').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.cat-btn[data-cat]').forEach(x=>x.classList.remove('active'));b.classList.add('active');loadTray(b.dataset.cat);Snd.snap();};});
document.getElementById('clearBoard').onclick=()=>{board.querySelectorAll('.magnet').forEach(m=>m.remove());Snd.snap();};

loadTray('nature');loadRightPanel();

  else{sT++;const n=zW.filter((w,i)=>w===v.w[i]).length;fb.textContent=n+'/'+v.w.length+' in place — try again';fb.className='scr-fb fb-no';Snd.no();if(sT>=2)document.getElementById('scrShow').style.display='';}
